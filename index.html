<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum</title>
    <link rel="icon" href="assets/img/Frame.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container-header">
            <section class="section-header" id="logo">
                <img src="assets/img/Frame.png">
                <img src="assets/img/Louvre.png">
            </section>
            <section class="section-nav" id="nav"> 
                <nav class="nav">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a href="#visiting" class="nav-link"> Visiting </a>
                        </li>
                        <li class="nav-item">
                            <a href="#explore" class="nav-link"> Explore </a>
                        </li>
                        <li class="nav-item">
                            <a href="#video" class="nav-link"> Video </a>
                        </li>
                        <li class="nav-item">
                            <a href="#gallery" class="nav-link"> Gallery </a>
                        </li>
                        <li class="nav-item">
                            <a href="#tickets" class="nav-link"> Tickets </a>
                        </li>
                        <li class="nav-item">
                            <a href="#contacts" class="nav-link"> Contacts </a>
                        </li>
                    </ul>
                </nav>
            </section>
        </div>
    </header>
    <main class="main">
        <section class="section" id="welcome">
            <div class="title">
                <h1 class="section-title">Welcome to the Louvre</h1>
                <h2 class="section-description">From the castle to the museum</h2>
                <a href="https://www.google.com/maps/@48.8618159,2.3366818,3a,75y,81.55h,73.4t/data=!3m7!1e1!3m5!1sAF1QipOVxZQuSy3Bx9T_HpH_7FtBHDTXvI6SF-A10ocT!2e10!3e12!7i5472!8i2736" class="welcome-button"> Discover the Louvre </a>
            </div>
            <div class="welcome-image">
                <img src="assets/img/1.jpg" alt="Mona Lisa" id="mona-lisa">
            </div>
        </section>
        <section class="section" id="visiting">
            <div class="title">
                <h2 class="section-title">Visiting</h2>
            </div>
        </section>
        <section class="section" id="explore">
            <div class="title">
                <h2 class="section-title">Explore</h2>
            </div>
        </section>
        <section class="section" id="video">
            <div class="title">
                <h2 class="section-title">Video</h2>
            </div>
        </section>
        <section class="section" id="gallery">
            <div class="title">
                <h2 class="section-title">Gallery</h2>
            </div>
        </section>
        <section class="section" id="tickets">
            <div class="title">
                <h2 class="section-title">Tickets</h2>
            </div>
        </section>
        <section class="section" id="contacts">
            <div class="title">
                <h2 class="section-title">Contacts</h2>
            </div>
        </section>
    </main>
    <footer class="footer"></footer>
</body>
</html>
